x8.agoda.net/hotelImages/6508545/-1/3f1e7efb8fcaba330631a2b8b3263900.jpg", "https://pix8.agoda.net/hotelImages/6508545/-1/084a80ae29353aa017baf7d86f16cc44.jpg", "https://pix8.agoda.net/property/6508545/0/54575a668e38b34c449403db53be8df4.jpeg", "https://pix8.agoda.net/hotelImages/6508545/-1/006476e0c6833e6ef78be06667a1649b.jpg", "https://pix8.agoda.net/hotelImages/6508545/-1/0bfb2fbd2592c5bf50d1c2c2e3901cee.jpg"], "reviews": [{"author": "Tuiana", "text": "Мое пребывание в этом отеле было превосходным. Номера были прекрасные, с балконами и видом на море. Я заранее связался с отелем, чтобы нас как семью разместили в соседних номерах, и они любезно предоставили смежные номера, что было очень удобно.\n\nПерсонал отеля просто потрясающий – очень дружелюбный и отзывчивый. Они быстро и эффективно реагировали на любые просьбы и старались сделать наше пребывание максимально комфортным. Мне даже позволили заселиться раньше без дополнительной платы.\n\nУборка проходила каждый день. \n\nНа крыше есть бассейн. \nОтель удачно расположен - рядом много кафе, ресторанов и магазинов, а до пляжа недалеко.\n\nВ общем, все очень понравилось. Я однозначно бы порекомендовал этот отель.", "rating": 10.0, "date": "2 ночей, февраль 2024 г."}, {"author": "ах", "text": "Отель находится на тихой улочке, на третьей береговой линии. Номера компактные, но есть все необходимое. Номера не новые, но за такую цену недостатков не нашел. Уборка ежедневная. Персонал вежливый.", "rating": 9.2, "date": "6 ночей, март 2026 г."}, {"author": "Андрей", "text": "В целом все хорошо, бассейн больше для наслаждения видом. Строгим нужно учитывать, что цена низкая, приносят чай, кофе, воду, убирают, когда скажешь. Хотя стены тонкие, но в основном тихо.", "rating": 8.8, "date": "29 ночей, март 2026 г."}, {"author": "ALEKSEI", "text": "Средний отель. Номера небольшие, но для одного человека подойдут. Единственный большой минус - медленный Wi-Fi. Остальное не так критично. По итогу: цена – желательно пониже, обслуживание – быстрое и своевременное, чистота – нормально. Жить можно.", "rating": 8.8, "date": "31 ночей, март 2026 г."}, {"author": "Kirill", "text": "В общем, все очень понравилось, расположение хорошее, отель чистый и без насекомых. Каждый день убирались и приносили воду, чай и кофе, белье чистое, как и сам номер.", "rating": 9.6, "date": "14 ночей, февраль 2026 г."}, {"author": "Alexey", "text": "Брали 2 номера, все соответствует описанию и фотографиям. Убираются каждый день, добавляют чай и кофе. Везде чисто, видно, что заботятся о гостях. На крыше есть небольшой бассейн, столики и открывается вид на море и город.", "rating": 10.0, "date": "7 ночей, январь 2026 г."}, {"author": "Natalia", "text": "Обычный отель, немного грязноватые, сломанные, старые, но чистый и комфортный, спокойный, тихий, мне понравилось.", "rating": 10.0, "date": "3 ночей, апрель 2026 г."}, {"author": "Alexandra", "text": "Если ложитесь до 23 часов по Нячангу, будет вам шумно, так как дискотека под окнами, но в остальном чисто, постель белая, вода везде, очень комфортно. Комната небольшая, но вдвоем удобно. Балкон лишь номинальный: просто открывается дверь и сразу решетка, на нем не посидеть. Остальное мне понравилось, отель брали для отдыха вдвоем на пару дней.", "rating": 9.6, "date": "2 ночей, июнь 2025 г."}, {"author": "ANASTASIIA", "text": "Номер был чистым, мне понравилось, что в номере было большое окно, а также выход на балкон с прозрачными дверями. На крыше есть небольшой бассейн, в котором можно отлично поплавать, в отеле достаточно тихо, уборка проводилась каждый день. Единственный минус - номер был очень маленьким, вдвоем иногда было тесновато.", "rating": 8.8, "date": "4 ночей, июль 2025 г."}, {"author": "Maksim", "text": "Номер чистый, аккуратный, мебель свежая, все как на фото. Если не делаете уборку, вам каждый день приносят воду, чай и кофе, это приятно. У меня был номер за 9 долларов. Окно выходило на стену или в коридор, это не очень приватно. Минусы: менеджер при заселении прос                                         </div>
                                    </div>

                                    {hotel.description && (
                                        <p className="text-sm text-gray-700 leading-relaxed">{hotel.description}</p>
                                    )}

                                    {/* Номер и питание */}
                                    <div className="bg-gray-50 rounded-2xl p-4">
                                        <div className="flex items-center gap-3">
                                            <div className="w-10 h-10 bg-orange-50 rounded-xl flex items-center justify-center shrink-0">
                                                <i data-lucide="bed-double" className="w-5 h-5 text-orange-500"></i>
                                            </div>
                                            <div>
                                                <p className="text-base font-black text-gray-900">{hotel.roomType}</p>
                                                <p className="text-xs text-gray-500 italic uppercase font-bold">Питание</p>
                                                <p className="text-sm text-gray-700 font-bold">{hotel.mealPlan}</p>
                                            </div>
                                        </div>
                                    </div>

                                    {tourData.included && (
                                        <div className="bg-green-50 border border-green-100 rounded-2xl p-4">
                                            <div className="flex items-start gap-3">
                                                <div className="w-10 h-10 bg-white rounded-xl flex items-center justify-center shrink-0">
                                                    <i data-lucide="check-circle" className="w-5 h-5 text-green-600"></i>
                                                </div>
                                                <div>
                                                    <p className="text-xs text-green-700 uppercase font-black mb-1">Включено в стоимость</p>
                                                    <p className="text-sm text-gray-700 font-semibold leading-relaxed">{tourData.included}</p>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {/* Первый отзыв */}
                                    {hotel.reviews && hotel.reviews.length > 0 && (
                                        <div className="bg-orange-50 border border-orange-100 rounded-2xl p-4 text-sm text-gray-700">
                                            <ReviewText text={hotel.reviews[0].text} />
                                        </div>
                                    )}

                                    {/* Кнопка все отзывы */}
                                    <button onClick={() => openReviews(hotel.reviews)}
                                            className="w-full py-3 border border-gray-200 rounded-2xl text-sm font-black text-orange-500 uppercase italic">
                                        Все отзывы
                                    </button>

                                    {/* Цена и WhatsApp */}
                                    <a href={getOrderLink(hotel)} target="_blank" rel="noopener noreferrer"
                                       className="block bg-orange-500 rounded-3xl px-6 py-6 text-center shadow-lg active:scale-95 transition-all">
                                        <p className="text-3xl font-black text-white tracking-tighter mb-4">{hotel.price || tourData.totalPrice}</p>
                                        <div className="inline-flex w-full items-center justify-center gap-2 bg-[#25D366] rounded-2xl px-5 py-3.5 shadow-md">
                                            <i data-lucide="message-circle" className="w-5 h-5 text-white"></i>
                                            <span className="text-white font-black text-base uppercase tracking-widest">Заказать в WhatsApp</span>
                                        </div>
                                    </a>
                                </div>
                            </section>
                        ))}

                        {/* СЕКЦИЯ REELS */}
                        {tourData.igReels && tourData.igReels.length > 0 && (
                            <section className="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden p-5">
                                <h3 className="text-xl font-black text-gray-900 mb-4 uppercase">Отзывы наших туристов</h3>
                                <div className="flex gap-3 overflow-x-auto no-scrollbar pb-2">
                                    {tourData.igReels.map((reel, idx) => (
                                        <a key={idx} href={reel.link} target="_blank" rel="noopener noreferrer"
                                           className="relative shrink-0 w-32 h-56 rounded-2xl overflow-hidden shadow-sm block">
                                            <img src={reel.thumbnail}
                                                 className="absolute inset-0 w-full h-full object-cover"
                                                 alt="Видео отзыв" />
                                            <div className="absolute inset-0 bg-black/20 flex items-center justify-center">
                                                <i data-lucide="play" className="w-10 h-10 text-white opacity-80"></i>
                                            </div>
                                        </a>
                                    ))}
                                </div>
                            </section>
                        )}

                        {tourData.termsNote && (
                            <section className="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden p-5">
                                <div className="flex items-start gap-3">
                                    <div className="w-10 h-10 bg-orange-50 rounded-xl flex items-center justify-center shrink-0">
                                        <i data-lucide="file-text" className="w-5 h-5 text-orange-500"></i>
                                    </div>
                                    <div>
                                        <h3 className="text-base font-black text-gray-900 uppercase mb-2">Изменения и отмена</h3>
                                        <p className="text-sm text-gray-700 leading-relaxed">{tourData.termsNote}</p>
                                    </div>
                                </div>
                            </section>
                        )}

                    </main>

                    {/* ОВЕРЛЕЙ ОТЗЫВОВ */}
                    {tourData.hotels && tourData.hotels.length > 0 && (
                        <ReviewOverlay
                            isOpen={isReviewsOpen}
                            onClose={() => setIsReviewsOpen(false)}
                            reviews={activeReviews}
                        />
                    )}

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
