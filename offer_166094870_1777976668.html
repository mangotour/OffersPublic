oda.net/property/77010803/0/c4054222167cbc9386533b9541522baa.jpeg", "https://pix8.agoda.net/property/70585989/0/d3bdea59b3ad9e80cc1cdeeb59e9f82b.jpeg", "https://pix8.agoda.net/property/32757457/0/0d95e89437313ec8c591452e84ca40b1.jpg", "https://pix8.agoda.net/property/77010803/0/4fec4e98d22abb437ef8767da82217b4.jpeg", "https://pix8.agoda.net/property/7710666/756437651/1d568962d1df607166669ec04106155c.jpeg", "https://pix8.agoda.net/property/7710666/645604264/ca6a2a55b3a0769fa31d2ab6cec70f4c.jpeg", "https://pix8.agoda.net/property/7710666/756437651/7fe19374fa2ad0d790edabbe620f07c7.jpeg"], "reviews": [{"author": "Anara", "text": "Встретили с порога, с багажом помогли. Заселение вовремя, в 14:00. Минусы: плохая звукоизоляция и немного поношенные полотенца. Постельное белье чистое, вид из окна замечательный. Бассейн на крыше отличный. До моря около 15-20 минут пешком. В целом комфортное проживание.", "rating": 10.0, "date": "2 ночей, апрель 2026 г."}, {"author": "Kundyz", "text": "Недавно остановилась в отеле Florida в Нячанге, и он превзошел все мои ожидания!\\n\\nРасположение: отель находится в шаговой доступности от пляжа, у вас будет легкий доступ к потрясающему побережью и оживленной ночной жизни.\\n\\nНомера: просторно, чисто и уютно, вид на океан захватывающий. Комфортные кровати обеспечивают отличный отдых ночью.\\n\\nУдобства: отель предлагает приятную зону бассейна, фитнес-центр и вкусный шведский стол на завтрак, подходящий под различные вкусы. Персонал дружелюбный и внимательный, что делает пребывание еще приятнее.\\n\\nЦена: с учетом качества услуг и отличного расположения, считаю цены весьма разумными.\\n\\nВ целом, настоятельно рекомендую отель Florida всем, кто хочет отдохнуть в Нячанге. Не могу дождаться, чтобы вернуться!", "rating": 9.6, "date": "5 ночей, сентябрь 2025 г."}, {"author": "Viktor", "text": "Отличный отель! Комната была очень чистой, уборка проводилась ежедневно. Постельное белье и все банные принадлежности регулярно меняли. Прекрасное соотн \nГугл карта вам в помощь.\n\nОтель очень приличный.\nНомера небольшие.\nБасик нормальный. Фитнес совсем малюсенький.\nЗавтраки супер.\nПерсонал толковый и очень приветливый.\nУправляющему отдельный респект за это.\nЖил на 15 этаже. Вид на горы. С частичным морем. Мне очень понравилось. Большое открывающееся окно.\nСпа есть в отеле. С массажем.\nЦенник приемлемый.\n\nВ рамках пакетного тура..... Я бы не рекомендовал.\nА отдельно путешествующим - самое оно.\nОтмечу... Это мое персональное восприятие. И мой отельный номер ( который вполне устраивал).\nС удовольствием вернусь сюда.\nОтмечу, что гости были весьма культурными. Это не везде случается.\nПроцветания отелю. И сотрудникам 💞🥰", "rating": 10.0, "date": "13 ночей, октябрь 2025 г."}, {"author": "Rake", "text": "Впечатления от отеля отличные, хоть отель и не новый, например был нюанс с ванной. Она акриловая и немного играла, это единственный минус для меня.  Персонал приветливый и реагирует немедленно, сказал о плохом интернете, через 10 минут поставили дополнительный роутер и подняли скорость. И так далее, все вопросы сразу же решались. Это говорит о высоком уровне управления отелем, нацелено на улучшение атмосферы, за дни проживания в отеле была замечена работа менеджмента отеля, высшее руководство отеля приехало с проверкой работы персонала.", "rating": 9.6, "date": "10 ночей, апрель 2026 г."}], "price": "1,300,000 KRW"}, {"name": "Vesna Hotel Nha Trang", "stars": 4, "rating": 8.8, "ratingText": "Отлично", "location": "Нячанг", "roomType": "Honeymoon Deluxe", "mealPlan": "Завтрак включен", "description": "Добро пожаловать в отель Весна — вашу идеальную точку для отдыха в Нячанге, Вьетнам! Этот элегантный 5-звездочный отель, открытый в 2018 году, расположен всего в 1 км от центра города, что делает его уникальным для изучения местных достопримечательностей. Вы будете наслаждаться удобным расположением в районе Лок Тхо с его живописными пейзажами и близостью к белоснежным пляжам Южно-Китайского моря.\n\nОтель предлагает 344 стильно оформленных номера, оснащенных всеми современными удобствами, включая бесплатный Wi-Fi и уютные балконы с потрясающим видом на море. Для вашего полного комфорта и расслабления доступны многочисленные спа-процедуры, а также современный фитнес-центр и открытый бассейн, где вы сможете отдохнуть после насыщенного дня.\n\nОсобое внимание уделяется семьям: дети в возрасте от 2 до 5 лет проживают бесплатно, а гибкий график заезда и выезда делает планирование еще удобнее. Кроме того, разнообразные кулинарные удовольствия ждут вас в главном ресторане и уютном кафе отеля, предлагающем как местные деликатесы, так и интернациональные блюда.\n\nВ отеле Весна вас ждет исключительное обслуживание, которое обеспечит лидер команды консьержей. Вы без труда сможете организовать экскурсии, воспользоваться трансфером из аэропорта и насладиться удобством бесплатной парковки. Все это — по привлекательной цене, которая делает отель Весна отличным выбором для путешественников со всех уголков мира.", "amenities": [], "images": ["https://pix8.agoda.net/hotelImages/6425969/-1/a762e372da2adb683d398e10efc6dfb6.jpg", "https://pix8.agoda.net/hotelImages/6425969/0/84ddfbb60a386d7092bd39985ed95196.jpg", "https://pix8.agoda.net/hotelImages//6425969/-1/4ae9c2455d3986dc2213f7a6c1948b4b.jpg", "https://pix8.agoda.net/hotelImages//6425969/-1/91ab08ea0e6d9fa73077d56f954f6e2f.jpg", "https://pix8.agoda.net/hotelImages/6425969/-1/ae8c597e16a0949a44c0f67c8e1019fc.jpg", "https://pix8.agoda.net/property/6425969/1174875691/4be687bf0e3243aed575dac45180b6c9.jpeg", "https://pix8.agoda.net/property/6425969/1174875686/e4e9c02d134b4ecfc9d84f5ebafb023b.jpeg"], "reviews": [{"author": "Tatyana", "text": "Мы провели в отеле 10 дней и могу отметить следующее: отель расположен на первой береговой линии, через дорогу сразу пляж. У отеля есть лежаки, но их постоянно занимают, как только появляется возможность, так как они бесплатны один раз в день. Чистота поддерживается ежедневно и на вполне приемлемом уровне. У отеля 5 звёзд, но утюга не предоставили, что меня удивило и разочаровало. Завтраки здесь очень хорошие, много фруктов и различные блюда на шведском столе, есть кофемашина.", "rating": 8.0, "date": "10 ночей, февраль 2026 г."}, {"author": "Валерия", "text": "Я обычно не пишу отзывы, но цена и качество этого отеля меня приятно удивили. Наш номер с балконом и видом на океан выше 15-го этажа был отличным. Всё чисто, постель и полотенца всегда свежие. На пляже через дорогу можно воспользоваться лежаками бесплатно один раз в день. Полотенца выдают. Уборка очень качественная: полы моют, бар пополняют, на все просьбы реагируют моментально, что весьма редкость для Вьетнама. Бассейн удобный даже в дождливую погоду. Вкусные завтраки, но не хватает сваренного кофе — это, похоже, проблема по всему Вьетнаму. Особенно хочу выделить чистоту и обслуживание. Персонал помогает во всех вопросах. Обязательно вернёмся не раз. Уже были в Нячанге в других отелях на первой линии, но их минимальная цена была вдвое выше этой. Не смущайтесь ценой, бронируйте без сомнений. Отель полностью оправдывает свою стоимость.", "rating": 10.0, "date": "8 ночей, ноябрь 2024 г."}, {"author": "Stanislav", "text": "Я забронировал и оплатил номер с большим окном и прямым видом на море, но в итоге меня поселили в комнату с видом на стену. Я около двух часов пытался разрешить эту ситуацию на ресепшене, но они продолжали утверждать, что это то, что я забронировал. Они пытались меня обмануть, уверяя, что море и стена — одно и то же. Но я осознал, что это не так, и пытался объяснить, что отель с пятью звёздами не должен так поступать. Однако им совершенно безразлична репутация. Я мог бы поставить 5 звёзд, так как отель действительно хорош, но им всё равно на гостей. Они продают номера, которых у них нет, и просто ставят вас перед фактом. Мы останавливались всего на два дня, и я потратил 2-2.5 часа на исправление их ошибки и некомпетентности, но ничего не вышло. Я не понимаю, как можно рекомендовать отель, который может продать номер, которого нет, и поселить вас в темноту. Менеджеры на ресепшене будут делать вид, что ситуация нормальная, и я должен с этим согласиться. Я считаю, что две звезды у отеля лишние. Не знаю кто им их нарисовал, но они не понимают, что такое сервис. На фото белая стена сразу за окном.", "rating": 7.2, "date": "2 ночей, февраль 2026 г."}, {"author": "ALEXANDER", "text": "Не рекомендую. За эту поездку мы были в трех отелях, и Vesna оказалась самой худшей. Даже хуже 3-звездочного Tran Vien Dong. Частичный вид на море оказался лишь щелью между двумя зданиями с маленьким окном в углу. Двуспальные кровати заменены дешёвым матрасом на платформе с колёсиками. В номере нет шкафов или полок, куда можно положить вещи. Даже просто прикрыть дверь невозможно. Сушить купальники негде. Телевизор, похоже, самый старый из всех, что я видел в гостиницах Нячанга, постоянно зависает. На завтраке сын отравился несвежим арбузом, он был подозрительно мягким, но это заметили не сразу. На пляже каких-то 15-20 лежаков, и они всегда заняты, а гостиница может вместить до 700-1000 человек. Четырём людям выдают только 2 пляжных полотенца. Это такой у них сервис. Персонал грубый, с недовольными лицами. Уборщицы и раздающие полотенца на пляже разговаривают так, будто ты им денег должен и не отдаёшь, и не только с нами, я наблюдал это и с другими гостями. Рядом с отелем гулять особо негде, нужно ехать в центр. Моё мнение: есть много гостиниц в центре с реально хорошим сервисом и условиями, за которые можно поставить 5 звёзд.", "rating": 6.4, "date": "6 ночей, февраль 2026 г."}, {"author": "Max", "text": "Возможно, это лучший отель в этой ценовой категории. Отличное обслуживание, легкое общение, всегда идут навстречу, улучшили категорию номера, и все время остаются улыбчивыми и доброжелательными. А завтраки в отеле — просто песня, на любой вкус. Много азиатской и европейской еды, фруктов и различных напитков. Спасибо!", "rating": 10.0, "date": "февраль 2025 г., 1 ночь"}], "price": "1,400,000 KRW"}, {"name": "Vinpearl Beachfront Nha Trang", "stars": 5, "rating": 0.0, "ratingText": "", "location": "Нячанг", "roomType": "Studio Room", "mealPlan": "Завтрак включен", "description": "Добро пожаловать в Vinpearl Beachfront Nha Trang — роскошный оазис в самом сердце Нячанга, Вьетнам. Этот современный 5-звездочный отель открыт в 2018 году и предлагает невероятные виды на море из каждого из 895 элегантно оформленных номеров. Идеальное расположение в 0 км от центра города делает его превосходной базой для знакомства с красотами региона.\n\nНасладитесь релаксом в великолепных плавательных бассейнах, посещением современного фитнес-центра или расслабляющими процедурами в спа-салоне. Любители активного отдыха оценят широкий выбор спортивных удобств, включая частный пляж и шопинг в уютных магазинах.\n\nДля гурманов на территории отеля работают ресторан и кофе-хаус, предлагающие блюда как местной, так и международной кухни. А круглосуточный сервис обслуживания номеров позволит насладиться изысканными блюдами прямо в вашей комнате.\n\nVinpearl Beachfront Nha Trang гарантирует высокий уровень сервиса, комфорт и безопасность с бесплатным Wi-Fi и услугами консьержа. И все это по доступным ценам, что делает его идеальным для романтических поездок и семейного отпуска. Ваш незабываемый отдых ждет вас здесь!", "amenities": [], "images": ["https://pix8.agoda.net/hotelImages/5685860/-1/b13c8da817faf0fd2ec2366fa8550ac1.jpg", "https://pix8.agoda.net/hotelImages/5685860/-1/29c88541af91d82e0f6aec1da7a1fc27.jpg", "https://pix8.agoda.net/property/5685860/0/f70d355102171813eb955858bc3c957c.jpeg", "https://pix8.agoda.net/property/39323971/0/55eb719951d16e6a6cc4206babcf3a7d.jpeg", "https://pix8.agoda.net/property/76995255/0/2050e2615b7639a52a0859874b60bb40.jpeg", "https://pix8.agoda.net/hotelImages/5685860/59252325/b4867d4a69dfeb8a92854738c0a38775.png", "https://pix8.agoda.net/hotelImages/5685860/59252325/fd4092b0c5d807f2b34730052891a0d8.png", "https://pix8.agoda.net/hotelImages/5685860/59252325/1522459079099c84490fef7e8336ef6d.png", "https://pix8.agoda.net/property/5685860/800659578/77f22c3a60cc0fc195fb5d6d52f2fd63.jpeg", "https://pix8.agoda.net/hotelImages/5685860/59252325/399808070d26d4bbe85be34c7effe775.png"], "reviews": [{"author": "Galina", "text": "Отличный отель в самом центре города, вокруг полно кафе, магазинов, массажных салонов и прачечных. Номер просторный, с шикарным балконом и прекрасным видом. Матрасы, бельё и подушки – выше всяких похвал. Завтраки тоже порадовали: много разнообразной еды, и тут точно лучший суп фо бо в городе! Хотела бы отдельно отметить работу англоговорящего персонала – они молодцы, быстро реагируют и решают все вопросы. Сын забыл телефон в самолёте, мы обратились к сотруднику на ресепшен, и он посодействовал в его возвращении! А Нина, говорящая по-русски, просто умница: внимательная, вежливая, всегда с улыбкой и моментально помогла с любой просьбой. У нас был неисправный холодильник, сказали Нине и в тот же день получили новый холодильник с морозилкой! Нина, спасибо вам большое! Отель точно стоит своей цены, рекомендуем и обязательно вернёмся!", "rating": 9.6, "date": "11 ночей, январь 2026 г."}, {"author": "Serdar", "text": "Проживали с женой с 10 по 18 сентября. Сначала нас поселили в номер с боковым видом на море, но по нашей просьбе быстро переселили в номер с прямым видом. Качество чувствуется буквально во всём. Мы обратили внимание на постельное бельё, которое всегда оставалось сухим, несмотря на влажный климат, из-за чего вся наша одежда была сырой. Отличные матрасы, утюг и гладильная доска предоставляются бесплатно. Персонал всегда вежлив и почтителен. Завтраки разнообразные, всё на высшем уровне. Мы рассматривали несколько отелей в этой ценовой категории и в итоге выбрали этот, о чём не пожалели ни на секунду.", "rating": 10.0, "date": "4 ночей, сентябрь 2025 г."}, {"author": "Sergey", "text": "Останавливались в номере с двумя спальнями на 32 этаже. Очень понравился великолепный вид на море и дорогу из панорамных окон. К сожалению, окна и стеклянное ограждение балкона были грязными, что расстроило. Сам номер внутри чистый, есть все необходимые туалетные принадлежности и халаты. Не совсем понятно назначение кухни в номере, так как она не оборудована для приготовления пищи – только чайник и стаканы. Холодильник не работал при заселении, но его быстро заменили на исправный, спасибо за это. Кондиционирование через центральную сплит-систему отличное: равномерно охлаждает комнаты и не дует. Завтрак отличный и разнообразный, но немного не хватило европейских каш. Бассейн на 6 этаже показался холодным из-за ветра. У отеля есть несколько собственных шезлонгов на пляже и сервис пляжных полотенец, что очень удобно. От песка ноги можно сполоснуть рядом с входом в отель. В целом, очень довольны отдыхом.", "rating": 9.6, "date": "6 ночей, апрель 2025 г."}, {"author": "Natalia", "text": "Отель понравился, хоть он и не новый, но уровень чувствуется. Номера комфортные, кровати удобные, чисто. Завтраки великолепные, уходить не хотелось. Единственный минус – отель в центре, ночью шум от местных заведений, даже беруши не спасают. Поэтому стоит подумать, брать ли номер с видом на море, возможно, вариант с видом во внутренний двор будет тише.", "rating": 9.6, "date": "3 ночей, апрель 2025 г."}, {"author": "Irina", "text": "Отель расположен в удачном месте. В пешей доступности магазины, фруктовые лавки, кафе, рестораны, аптеки и прочие магазины. Пляж через дорогу, отель предоставляет лежаки и полотенца. Лежаков немного для такого большого отеля. Завтраки отличные, каждый найдёт что-то на свой вкус. Кофемашин нужно больше, к ним очередь, что не очень удобно. В номерах чисто, есть все принадлежности: халаты, тапочки. Небольшая кухня в номере, чайник, холодильник, сушилка на балконе. Всё понравилось. Приедем в следующем году!", "rating": 9.2, "date": "10 ночей, май 2025 г."}], "price": "1,750,000 KRW"}]`, fallbackHotels),
            igReels: parseInjectedJson(String.raw`[{"thumbnail": "https://raw.githubusercontent.com/mangotour/Offers/main/reel_1.png", "link": "https://www.instagram.com/stories/highlights/18404039212150167/"}, {"thumbnail": "https://raw.githubusercontent.com/mangotour/Offers/main/reel_2.png", "link": "https://www.instagram.com/stories/highlights/18073118810103351/"}, {"thumbnail": "https://raw.githubusercontent.com/mangotour/Offers/main/reel_3.png", "link": "https://www.instagram.com/stories/highlights/18207003232316313/"}, {"thumbnail": "https://raw.githubusercontent.com/mangotour/Offers/main/reel_4.png", "link": "https://www.instagram.com/stories/highlights/18098414977586720/"}]`, fallbackReels)
        };

        // ===== КАРУСЕЛЬ ФОТО =====
        const HotelCarousel = ({ images, hotelName }) => {
            const [current, setCurrent] = useState(0);
            const scrollRef = useRef(null);
            const total = images ? images.length : 0;

            const goTo = (idx) => {
                setCurrent(idx);
                if (scrollRef.current) {
                    scrollRef.current.scrollTo({ left: idx * scrollRef.current.offsetWidth, behavior: 'smooth' });
                }
            };

            const handleScroll = () => {
                if (scrollRef.current) {
                    const idx = Math.round(scrollRef.current.scrollLeft / scrollRef.current.offsetWidth);
                    setCurrent(idx);
                }
            };

            if (!images || images.length === 0) {
                return <div className="w-full h-64 bg-gray-100 flex items-center justify-center text-gray-400 text-sm">Нет доступных фото</div>;
            }

            return (
                <div className="relative w-full h-64">
                    <div ref={scrollRef} onScroll={handleScroll}
                         className="flex overflow-x-auto no-scrollbar snap-x snap-mandatory h-full">
                        {images.map((img, idx) => (
                            <img key={idx} src={img}
                                 className="w-full h-full object-cover snap-center shrink-0"
                                 alt={`${hotelName} фото ${idx + 1}`} />
                        ))}
                    </div>
                    {total > 1 && (
                        <>
                            {/* Счётчик */}
                            <div className="absolute top-3 right-3 bg-black/40 rounded-xl px-2.5 py-1 text-white text-xs font-bold">
                                {current + 1} / {total}
                            </div>
                            {/* Точки */}
                            <div className="absolute bottom-3 left-0 right-0 flex justify-center gap-1.5">
                                {images.map((_, idx) => (
                                    <div key={idx} onClick={() => goTo(idx)}
                                         className={`rounded-full transition-all duration-200 cursor-pointer ${idx === current ? 'w-4 h-2 bg-white' : 'w-2 h-2 bg-white/50'}`} />
                                ))}
                            </div>
                        </>
                    )}
                </div>
            );
        };

        // ===== ОВЕРЛЕЙ ОТЗЫВОВ =====
        const ReviewText = ({ text }) => {
            const [expanded, setExpanded] = useState(false);
            if (!text) return null;
            const canExpand = text.length > 140;

            return (
                <div>
                    <p
                        className="text-base text-gray-700 leading-relaxed"
                        style={expanded ? {} : { maxHeight: '4.8em', overflow: 'hidden' }}
                    >
                        "{text}"
                    </p>
                    {canExpand && (
                        <button
                            onClick={() => setExpanded(!expanded)}
                            className="mt-2 text-sm font-black text-orange-500 uppercase"
                        >
                            {expanded ? 'Скрыть' : 'Читать дальше'}
                        </button>
                    )}
                </div>
            );
        };

        const ReviewOverlay = ({ isOpen, onClose, reviews }) => {
            useEffect(() => {
                document.body.style.overflow = isOpen ? 'hidden' : 'auto';
                if (window.lucide && isOpen) setTimeout(() => window.lucide.createIcons(), 50);
                return () => { document.body.style.overflow = 'auto'; };
            }, [isOpen]);

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 z-50 bg-white flex flex-col">
                    <div className="flex justify-between items-center px-5 py-4 border-b border-gray-200 bg-white">
                        <h3 className="text-xl font-black text-gray-900 italic">Отзывы гостей</h3>
                        <button onClick={onClose} className="w-12 h-12 bg-gray-100 rounded-2xl flex items-center justify-center">
                            <i data-lucide="x" className="w-6 h-6"></i>
                        </button>
                    </div>
                    <div className="flex-1 overflow-y-auto px-5 py-5 space-y-4 bg-gray-50">
                        {reviews && reviews.length > 0 ? reviews.map((rev, idx) => (
                            <div key={idx} className="bg-white rounded-3xl p-5 shadow-sm border border-gray-100">
                                <div className="flex justify-between items-start mb-3">
                                    <div>
                                        <span className="text-base font-black text-gray-900 block">{rev.author}</span>
                                        <span className="text-xs text-gray-400 font-semibold">{rev.date}</span>
                                    </div>
                                    <div className="bg-amber-100 text-amber-700 px-3 py-1.5 rounded-2xl text-sm font-black flex items-center gap-1 shadow-sm">
                                        <i data-lucide="star" className="w-4 h-4 fill-current"></i>
                                        Оценка: {Number(rev.rating || 10).toFixed(1).replace('.0', '')}/10
                                    </div>
                                </div>
                                <ReviewText text={rev.text} />
                            </div>
                        )) : (
                            <div className="text-center text-gray-400 py-10">Отзывы появятся скоро</div>
                        )}
                    </div>
                </div>
            );
        };

        // ===== ГЛАВНЫЙ КОМПОНЕНТ =====
        const App = () => {
            const [isReviewsOpen, setIsReviewsOpen] = useState(false);
            const [activeReviews, setActiveReviews] = useState([]);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [isReviewsOpen]);

            const getOrderLink = (hotel) => {
                const flightLines = (tourData.flights || []).map((flight) => {
                    const label = flight.type ? flight.type.toUpperCase() : 'РЕЙС';
                    const date = flight.date ? `${flight.date} ` : '';
                    const time = [flight.depTime, flight.arrTime].filter(Boolean).join(' - ');
                    return `${label}: ${date}${time}`.trim();
                }).filter(Boolean);
                const details = [
                    `Здравствуйте! Хочу заказать тур в отель ${hotel.name} по цене ${hotel.price || tourData.totalPrice}.`,
                    tourData.dates ? `Даты тура: ${tourData.dates}.` : '',
                    ...flightLines
                ].filter(Boolean).join('\n');
                const text = encodeURIComponent(details);
                return `https://wa.me/${tourData.contact.whatsapp}?text=${text}`;
            };

            const openReviews = (reviews) => {
                setActiveReviews(reviews || []);
                setIsReviewsOpen(true);
            };

            return (
                <div className="max-w-md mx-auto bg-gray-50 min-h-screen pb-16 text-gray-900">

                    {/* ШАПКА */}
                    <header className="relative bg-white border-b border-gray-100 px-5 py-3 flex justify-between items-center sticky top-0 z-30 shadow-sm">
                        <div className="w-11 h-11 rounded-2xl shadow-sm overflow-hidden bg-white flex items-center justify-center shrink-0">
                            <img src={tourData.logoPath} alt="Mango Tour" className="w-full h-full object-cover" />
                        </div>
                        <div className="absolute left-1/2 -translate-x-1/2 text-center text-base font-black text-yellow-400 tracking-widest whitespace-nowrap">MANGO TOUR</div>
                        <div className="flex gap-2 justify-end">
                            <a href={tourData.contact.instagram} target="_blank" rel="noopener noreferrer"
                               style={{background: 'linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%)'}}
                               className="w-11 h-11 text-white flex items-center justify-center rounded-2xl shadow-sm">
                                <svg viewBox="0 0 24 24" fill="currentColor" className="w-7 h-7">
                                    <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/>
                                </svg>
                            </a>
                            <a href={tourData.contact.facebook} target="_blank" rel="noopener noreferrer"
                               className="w-11 h-11 bg-[#1877F2] text-white flex items-center justify-center rounded-2xl shadow-sm">
                                <svg viewBox="0 0 32 32" fill="currentColor" className="w-8 h-8 ml-1 mt-1">
                                    <path d="M21.95 5.005l-3.306-.004c-3.206 0-5.277 2.124-5.277 5.415v2.815h-3.328v3.95h3.328v10.584h4.091v-10.584h3.332l.532-3.95h-3.864v-2.316c0-1.12.31-1.884 1.916-1.884h2.054v-3.535c-.354-.047-1.574-.153-2.992-.153z"/>
                                </svg>
                            </a>
                        </div>
                    </header>

                    <main className="px-4 pt-6 space-y-5">

                        {/* СЕКЦИЯ ПЕРЕЛЁТА */}
                        <section className="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
                            <div className="bg-orange-500 px-6 py-5">
                                <h2 className="text-3xl font-black text-white tracking-tight">{tourData.city}</h2>
                            </div>
                            <div className="flex divide-x divide-gray-100 border-b border-gray-100">
                                <div className="flex-1 px-5 py-4">
                                    <p className="text-base font-black text-gray-900">{tourData.dates}</p>
                                </div>
                                <div className="flex-1 px-5 py-4">
                                    <p className="text-base font-black text-gray-900">{tourData.pax} чел.</p>
                                </div>
                            </div>
                            <div className="divide-y divide-gray-100">
                                {tourData.flights && tourData.flights.length > 0 ? (
                                    tourData.flights.map((f, i) => (
                                        <div key={i} className="px-5 py-4 flex items-center gap-4">
                                            <div className={`w-11 h-11 rounded-2xl flex items-center justify-center shrink-0 ${f.type === 'туда' ? 'bg-orange-50' : 'bg-blue-50'}`}>
                                                <i data-lucide="plane" className={`w-5 h-5 ${f.type === 'туда' ? 'text-orange-500' : 'text-blue-500 rotate-180'}`}></i>
                                            </div>
                                            <div className="flex-1 min-w-0">
                                                <p className="text-lg font-black text-gray-900">{f.depTime} — {f.arrTime}</p>
                                                {(() => {
                                                    const flightInfo = [f.airline, f.number].filter(Boolean).join(' · ');
                                                    const route = [f.from, f.to].filter(Boolean).join(' – ');
                                                    const details = [flightInfo, route].filter(Boolean).join(' · ');
                                                    return details ? <p className="text-sm text-gray-500">{details}</p> : null;
                                                })()}
                                                {f.duration && <p className="text-xs text-gray-400">{f.duration}</p>}
                                            </div>
                                            <div className="shrink-0">
                                                {f.baggage ? (
                                                    <div className="bg-green-50 text-green-700 px-3 py-1 rounded-xl text-xs font-black italic">Багаж {f.baggage}</div>
                                                ) : (
                                                    <div className="bg-gray-50 text-gray-400 px-3 py-1 rounded-xl text-xs font-bold italic">Без багажа</div>
                                                )}
                                            </div>
                                        </div>
                                    ))
                                ) : (
                                    <div className="px-5 py-4 text-center text-gray-400 text-sm italic">Данные о рейсах уточняются</div>
                                )}
                            </div>
                        </section>

                        {/* СЕКЦИЯ ОТЕЛЕЙ */}
                        {tourData.hotels && tourData.hotels.map((hotel, i) => (
                            <section key={i} className="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">

                                {/* КАРУСЕЛЬ */}
                                <HotelCarousel images={hotel.images} hotelName={hotel.name} />

                                <div className="px-5 py-5 space-y-4">
                                    {/* Название и локация */}
                                    <div>
                                        <h3 className="text-xl font-black text-gray-900">{hotel.name}</h3>
                                        <div className="mt-2 border-l-4 border-orange-400 pl-3">
                                            <div className="uppercase tracking-tight text-xs font-bold text-gray-500 mb-1">
                                                {hotel.location}{hotel.stars ? ` · ${hotel.stars} звезд` : ''}
                                            </div>
                                            {hotel.rating > 0 && (
                                                <div className="flex items-center gap-1.5">
                                                    <span className="bg-amber-100 text-amber-700 px-2 py-0.5 rounded text-sm font-black">{hotel.rating.toFixed(1)}</span>
                                                    <span className="text-sm font-bold text-gray-800">{hotel.ratingText}</span>
                                                </div>
                                            )}
                                        </div>
                                    </div>

                                    {hotel.description && (
                                        <p className="text-sm text-gray-700 leading-relaxed">{hotel.description}</p>
                                    )}

                                    {/* Номер и питание */}
                                    <div className="bg-gray-50 rounded-2xl p-4">
                                        <div className="flex items-center gap-3">
                                            <div className="w-10 h-10 bg-orange-50 rounded-xl flex items-center justify-center shrink-0">
                                                <i data-lucide="bed-double" className="w-5 h-5 text-orange-500"></i>
                                            </div>
                                            <div>
                                                <p className="text-base font-black text-gray-900">{hotel.roomType}</p>
                                                <p className="text-xs text-gray-500 italic uppercase font-bold">Питание</p>
                                                <p className="text-sm text-gray-700 font-bold">{hotel.mealPlan}</p>
                                            </div>
                                        </div>
                                    </div>

                                    {tourData.included && (
                                        <div className="bg-green-50 border border-green-100 rounded-2xl p-4">
                                            <div className="flex items-start gap-3">
                                                <div className="w-10 h-10 bg-white rounded-xl flex items-center justify-center shrink-0">
                                                    <i data-lucide="check-circle" className="w-5 h-5 text-green-600"></i>
                                                </div>
                                                <div>
                                                    <p className="text-xs text-green-700 uppercase font-black mb-1">Включено в стоимость</p>
                                                    <p className="text-sm text-gray-700 font-semibold leading-relaxed">{tourData.included}</p>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {/* Первый отзыв */}
                                    {hotel.reviews && hotel.reviews.length > 0 && (
                                        <div className="bg-orange-50 border border-orange-100 rounded-2xl p-4 text-sm text-gray-700">
                                            <ReviewText text={hotel.reviews[0].text} />
                                        </div>
                                    )}

                                    {/* Кнопка все отзывы */}
                                    <button onClick={() => openReviews(hotel.reviews)}
                                            className="w-full py-3 border border-gray-200 rounded-2xl text-sm font-black text-orange-500 uppercase italic">
                                        Все отзывы
                                    </button>

                                    {/* Цена и WhatsApp */}
                                    <a href={getOrderLink(hotel)} target="_blank" rel="noopener noreferrer"
                                       className="block bg-orange-500 rounded-3xl px-6 py-6 text-center shadow-lg active:scale-95 transition-all">
                                        <p className="text-3xl font-black text-white tracking-tighter mb-4">{hotel.price || tourData.totalPrice}</p>
                                        <div className="inline-flex w-full items-center justify-center gap-2 bg-[#25D366] rounded-2xl px-5 py-3.5 shadow-md">
                                            <i data-lucide="message-circle" className="w-5 h-5 text-white"></i>
                                            <span className="text-white font-black text-base uppercase tracking-widest">Заказать в WhatsApp</span>
                                        </div>
                                    </a>
                                </div>
                            </section>
                        ))}

                        {/* СЕКЦИЯ REELS */}
                        {tourData.igReels && tourData.igReels.length > 0 && (
                            <section className="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden p-5">
                                <h3 className="text-xl font-black text-gray-900 mb-4 uppercase">Отзывы наших туристов</h3>
                                <div className="flex gap-3 overflow-x-auto no-scrollbar pb-2">
                                    {tourData.igReels.map((reel, idx) => (
                                        <a key={idx} href={reel.link} target="_blank" rel="noopener noreferrer"
                                           className="relative shrink-0 w-32 h-56 rounded-2xl overflow-hidden shadow-sm block">
                                            <img src={reel.thumbnail}
                                                 className="absolute inset-0 w-full h-full object-cover"
                                                 alt="Видео отзыв" />
                                            <div className="absolute inset-0 bg-black/20 flex items-center justify-center">
                                                <i data-lucide="play" className="w-10 h-10 text-white opacity-80"></i>
                                            </div>
                                        </a>
                                    ))}
                                </div>
                            </section>
                        )}

                        {tourData.termsNote && (
                            <section className="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden p-5">
                                <div className="flex items-start gap-3">
                                    <div className="w-10 h-10 bg-orange-50 rounded-xl flex items-center justify-center shrink-0">
                                        <i data-lucide="file-text" className="w-5 h-5 text-orange-500"></i>
                                    </div>
                                    <div>
                                        <h3 className="text-base font-black text-gray-900 uppercase mb-2">Изменения и отмена</h3>
                                        <p className="text-sm text-gray-700 leading-relaxed">{tourData.termsNote}</p>
                                    </div>
                                </div>
                            </section>
                        )}

                    </main>

                    {/* ОВЕРЛЕЙ ОТЗЫВОВ */}
                    {tourData.hotels && tourData.hotels.length > 0 && (
                        <ReviewOverlay
                            isOpen={isReviewsOpen}
                            onClose={() => setIsReviewsOpen(false)}
                            reviews={activeReviews}
                        />
                    )}

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
