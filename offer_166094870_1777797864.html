ши не спасают. Подумайте, перед тем как брать номер с видом на море, может лучше во двор, будет тише.", "rating": 9.6, "date": "3 ночей, апрель 2025 г."}, {"author": "Irina", "text": "Отель в отличном месте: рядом магазины, к кафе и аптекам пешком. Пляж через дорогу, отельные лежаки с полотенцами. Правда, шезлонгов мало для такого большого отеля. Завтраки замечательные, каждый найдет что поесть. Кофемашин мало — очередь. В комнатах чисто, все принадлежности есть: халаты, тапочки, мини-кухня с чайником и холодильником. Нам очень понравилось, приедем в следующем году!", "rating": 9.2, "date": "10 ночей, май 2025 г."}], "price": "1,600,000 KRW"}, {"name": "Comodo Nha Trang Hotel", "stars": 4, "rating": 8.8, "ratingText": "Отлично", "location": "Нячанг", "roomType": "Senior Deluxe Room Twin Beds", "mealPlan": "Завтрак включен", "description": "Добро пожаловать в Comodo Nha Trang Hotel — оазис комфорта и уюта в самом сердце Вьетнама. Всего в нескольких шагах от центра города, он предлагает идеальное сочетание удобства и современности.\n\nОтель насчитывает 241 просторный номер, многие из которых открывают великолепные виды на море. Гостям предоставляется все для комфорта: от кондиционеров и мини-баров до бесплатного Wi-Fi. Семейный отдых станет особенно приятным благодаря бесплатному размещению детей до 5 лет.\n\nЛюбители активного отдыха оценят современный фитнес-центр и два бассейна — открытый и закрытый, которые подходят как для занятий спортом, так и для отдыха. После активного дня релаксация гарантирована в нашем спа-салоне или стильном баре с разнообразными напитками.\n\nЕжедневные завтраки шведский стол подарят бодрое начало дня, а внимательный персонал сделает ваше пребывание максимально комфортным. Благодаря удобной транспортной доступности и близости к главному пляжу, отель станет отличной отправной точкой для изучения Нячанга. Discover the charm of Comodo Nha Trang Hotel!", "amenities": [], "images": [], "reviews": [{"author": "Alena", "text": "Персонал в отеле W"}, {"name": "Emerald Bay Hotel & Spa", "stars": 4, "rating": 8.8, "ratingText": "Отлично", "location": "Нячанг", "roomType": "Улучшенный двухместный номер с 2 отдельными кроватями", "mealPlan": "Завтрак включен", "description": "Добро пожаловать в Emerald Bay Hotel and Spa — изысканный пятизвездочный отель в сердце Нячанга, Вьетнам. Идеально расположенный в одном километре от центра города и в 35 минутах от аэропорта, этот отель станет вашим идеальным уголком для комфортного отдыха или деловой поездки.\n\nОтель предлагает 220 стильных номеров, созданных для вашего комфорта. Насладитесь великолепными видами на океан или город из вашего номера, независимо от его категории. Для полного расслабления посетите современный фитнес-центр, наслаждайтесь частным пляжем и восхититесь бассейном с баром у воды.\n\nВ Emerald Bay вас ждут кулинарные шедевры: ресторан предлагает разнообразные блюда, будь то вьетнамская кухня на завтрак или континентальные деликатесы. Для уединения и удобства доступно круглосуточное обслуживание номеров.\n\nОтель также предоставляет трансфер из аэропорта и аренду автомобилей, идеально сочетая комфорт с удобством. Если вы хотите исследовать гармонию местной культуры, район Лộc Тхо с его парками и рынками удовлетворит ваше любопытство и жажду открытий.\n\nEmerald Bay Hotel and Spa — это идеальное место для тех, кто ценит сочетание высочайшего уровня сервиса, доступности, комфорта и роскоши. Здесь ваш отдых станет поистине незабываемым!", "amenities": [], "images": [], "reviews": [{"author": "Olha", "text": "Отель в целом неплохой, но ожидания были выше из-за описания и пяти звезд на сайтах. Из минусов: 1) Я имел приоритет на ранее заселение, но в итоге попал в номер даже позже обычного на 30 минут. 2) Хотя мне повысили категорию номера, что было приятно, сам номер оказался небольшим, с крохотным балконом (трудно представить, каковы меньшие номера), и у меня были претензии. Дверь шкафа не могла открываться полностью из-за расположения возле входной двери (я бы предложил просто убрать дверь шкафа), ремонт выполнен быстро, например, потолок грубо замазан; нет мягкого освещения для ночи, приходилось оставлять свет в туалете, но прозрачные стены мешали спать. 3) Завтраки разнообразные, много мясных блюд, но они были или очень жареными, или острыми, ел только вареные или сырые овощи; не было сыра, орехов, сладости к чаю каждый день одинаковые и тоже не по вкусу. Хотелось бы больше разнообразия для иностранцев. 4) При заселении дают инструкцию, напоминающую угрозу, с требованием пересчитывать полотенца и халаты каждый день после уборки, иначе штрафы, если что-то пропадет или сломается. Это звучит очень резко. 5) Шезлонгов всего пара десятков на пару отелей, но можно взять полотенце у пляжа. Из плюсов: 1) Большой холл и дружелюбный персонал. 2) Приятный спа и массажа. 3) Вкусная еда в ресторане. 4) Прекрасный вид на море из номеров.", "rating": 8.4, "date": "4 ночей, июль 2025 г."}, {"author": "GEORGII", "text": "Удалось забронировать отель за 22 доллара в сутки, и это был отличный вариант за такие деньги. Отель новый, расположен во дворе, так что шум дороги не доносится. С одной стороны это тишина, с другой - номера с видом на море на самом деле выходят на стену другого отеля. Нам повезло: наши окна выходили на пустырь и горы, и это куда приятнее. Завтрак проходит с 6 до 10 утра, достойный набор блюд, но кофемашины с зерновым кофе нет, странно, учитывая, что страна известна своим кофе. Кровать и постельные принадлежности превосходные, подушки особенно хорошие. Уборка на 4, не идеальная, но приемлемая. Местоположение великолепное, на южной окраине города, до Лотоса 15 минут пешком, рядом большой торговый центр и много заведений. Справа от отеля кафе 'Кочевник' от киргизов, слева 'Морячок' от русских. Соотношение цены и качества блюд отличное. В целом, это адекватный выбор за такие деньги.", "rating": 10.0, "date": "18 ночей, апрель 2025 г."}, {"author": "Роман", "text": "Номер Deluxe City View просторный, с большой удобной кроватью и всеми удобствами. Уборка ежедневная, чистота и порядок. Особенно понравился вид на город. Местоположение идеальное, буквально минута до пляжа, много магазинов рядом. Персонал вежливый и внимательный, всегда готов помочь. Завтраки разнообразные, есть как европейские, так и азиатские блюда. Бассейн на крыше - отличный бонус, особенно вечером с видом на ночной город. Wi-Fi стабильно работает по всему отелю. Спа-салон впечатлил качеством услуг и разумными ценами. Рекомендую этот отель всем, кто ищет комфортный отдых. Планируем вернуться сюда!", "rating": 9.6, "date": "16 ночей, апрель 2025 г."}, {"author": "Ангелина", "text": "Отель мне понравился. Вкусные и разнообразные завтраки. При заезде меня поселили раньше бесплатно, хоть я и приехала раньше. Пока ждала, мне предложили свежевыжатый арбузный сок. В номере была приветственная корзина с фруктами. Чистота была обеспечена, везде приятно пахло. Полотенца меняли, одноразовые мелочи пополняли ежедневно. Персонал улыбчивый и вежливый, всегда откроют дверь и помогут с багажом.", "rating": 8.8, "date": "9 ночей, октябрь 2025 г."}, {"author": "Дарья", "text": "Очень вежливый персонал, уборку делают хорошо. Единственное, мне не понравились завтраки, выбор ограничен. Бассейн небольшой, всего три шезлонга на отель. На пляже шезлонгов тоже мало, но можно взять полотенце и отдохнуть там. Номер делюкс хороший, и я получила немного фруктов в подарок.", "rating": 9.6, "date": "8 ночей, январь 2026 г."}, {"author": "Svetlana", "text": "Отличное место. Главное, что есть кнопочка «не беспокоить», потому что в предыдущем отеле нас будили в 9 утра для уборки. Завтраки были не очень вкусными, спортзал хороший, бассейн был холодный, но по проживанию все супер. Тихо, спокойно, уютно.", "rating": 10.0, "date": "2 ночей, январь 2026 г."}, {"author": "Игорь", "text": "Отличный отель. Хорошая цена. Первая линия. Персонал очень любезный. Отдельное спасибо Нат.", "rating": 10.0, "date": "7 ночей, февраль 2026 г."}, {"author": "Hanna", "text": "Все было прекрасно. Завтраки замечательные, европейцам есть из чего выбрать. Для ребенка двух лет тоже нашлось, что покушать.", "rating": 9.6, "date": "14 ночей, июнь 2025 г."}, {"author": "vladimir", "text": "Персонал на стойке регистрации не выполнил условия ваучера по раннему заезду и позднему выезду. В остальном отель вполне хороший.", "rating": 6.0, "date": "февраль 2026 г., 1 ночь"}, {"author": "Chingis", "text": "Все отлично. Понравился персонал и завтрак.", "rating": 10.0, "date": "декабрь 2025 г., 1 ночь"}], "price": "1,250,000 KRW"}]`, fallbackHotels),

                                    tourData.flights.map((f, i) => (
                                        <div key={i} className="px-5 py-4 flex items-center gap-4">
                                            <div className={`w-11 h-11 rounded-2xl flex items-center justify-center shrink-0 ${f.type === 'туда' ? 'bg-orange-50' : 'bg-blue-50'}`}>
                                                <i data-lucide="plane" className={`w-5 h-5 ${f.type === 'туда' ? 'text-orange-500' : 'text-blue-500 rotate-180'}`}></i>
                                            </div>
                                            <div className="flex-1 min-w-0">
                                                <p className="text-lg font-black text-gray-900">{f.depTime} — {f.arrTime}</p>
                                                {(() => {
                                                    const flightInfo = [f.airline, f.number].filter(Boolean).join(' · ');
                                                    const route = [f.from, f.to].filter(Boolean).join(' – ');
                                                    const details = [flightInfo, route].filter(Boolean).join(' · ');
                                                    return details ? <p className="text-sm text-gray-500">{details}</p> : null;
                                                })()}
                                                {f.duration && <p className="text-xs text-gray-400">{f.duration}</p>}
                                            </div>
                                            <div className="shrink-0">
                                                {f.baggage ? (
                                                    <div className="bg-green-50 text-green-700 px-3 py-1 rounded-xl text-xs font-black italic">Багаж {f.baggage}</div>
                                                ) : (
                                                    <div className="bg-gray-50 text-gray-400 px-3 py-1 rounded-xl text-xs font-bold italic">Без багажа</div>
                                                )}
                                            </div>
                                        </div>
                                    ))
                                ) : (
                                    <div className="px-5 py-4 text-center text-gray-400 text-sm italic">Данные о рейсах уточняются</div>
                                )}
                            </div>
                        </section>

                        {/* СЕКЦИЯ ОТЕЛЕЙ */}
                        {tourData.hotels && tourData.hotels.map((hotel, i) => (
                            <section key={i} className="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">

                                {/* КАРУСЕЛЬ */}
                                <HotelCarousel images={hotel.images} hotelName={hotel.name} />

                                <div className="px-5 py-5 space-y-4">
                                    {/* Название и локация */}
                                    <div>
                                        <h3 className="text-xl font-black text-gray-900">{hotel.name}</h3>
                                        <div className="mt-2 border-l-4 border-orange-400 pl-3">
                                            <div className="uppercase tracking-tight text-xs font-bold text-gray-500 mb-1">
                                                {hotel.location}{hotel.stars ? ` · ${hotel.stars} звезд` : ''}
                                            </div>
                                            {hotel.rating > 0 && (
                                                <div className="flex items-center gap-1.5">
                                                    <span className="bg-amber-100 text-amber-700 px-2 py-0.5 rounded text-sm font-black">{hotel.rating.toFixed(1)}</span>
                                                    <span className="text-sm font-bold text-gray-800">{hotel.ratingText}</span>
                                                </div>
                                            )}
                                        </div>
                                    </div>

                                    {hotel.description && (
                                        <p className="text-sm text-gray-700 leading-relaxed">{hotel.description}</p>
                                    )}

                                    {/* Номер и питание */}
                                    <div className="bg-gray-50 rounded-2xl p-4">
                                        <div className="flex items-center gap-3">
                                            <div className="w-10 h-10 bg-orange-50 rounded-xl flex items-center justify-center shrink-0">
                                                <i data-lucide="bed-double" className="w-5 h-5 text-orange-500"></i>
                                            </div>
                                            <div>
                                                <p className="text-base font-black text-gray-900">{hotel.roomType}</p>
                                                <p className="text-xs text-gray-500 italic uppercase font-bold">Питание</p>
                                                <p className="text-sm text-gray-700 font-bold">{hotel.mealPlan}</p>
                                            </div>
                                        </div>
                                    </div>

                                    {tourData.included && (
                                        <div className="bg-green-50 border border-green-100 rounded-2xl p-4">
                                            <div className="flex items-start gap-3">
                                                <div className="w-10 h-10 bg-white rounded-xl flex items-center justify-center shrink-0">
                                                    <i data-lucide="check-circle" className="w-5 h-5 text-green-600"></i>
                                                </div>
                                                <div>
                                                    <p className="text-xs text-green-700 uppercase font-black mb-1">Включено в стоимость</p>
                                                    <p className="text-sm text-gray-700 font-semibold leading-relaxed">{tourData.included}</p>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {/* Первый отзыв */}
                                    {hotel.reviews && hotel.reviews.length > 0 && (
                                        <div className="bg-orange-50 border border-orange-100 rounded-2xl p-4 text-sm text-gray-700">
                                            <ReviewText text={hotel.reviews[0].text} />
                                        </div>
                                    )}

                                    {/* Кнопка все отзывы */}
                                    <button onClick={() => openReviews(hotel.reviews)}
                                            className="w-full py-3 border border-gray-200 rounded-2xl text-sm font-black text-orange-500 uppercase italic">
                                        Все отзывы
                                    </button>

                                    {/* Цена и WhatsApp */}
                                    <a href={getOrderLink(hotel)} target="_blank" rel="noopener noreferrer"
                                       className="block bg-orange-500 rounded-3xl px-6 py-6 text-center shadow-lg active:scale-95 transition-all">
                                        <p className="text-3xl font-black text-white tracking-tighter mb-4">{hotel.price || tourData.totalPrice}</p>
                                        <div className="inline-flex w-full items-center justify-center gap-2 bg-[#25D366] rounded-2xl px-5 py-3.5 shadow-md">
                                            <i data-lucide="message-circle" className="w-5 h-5 text-white"></i>
                                            <span className="text-white font-black text-base uppercase tracking-widest">Заказать в WhatsApp</span>
                                        </div>
                                    </a>
                                </div>
                            </section>
                        ))}

                        {/* СЕКЦИЯ REELS */}
                        {tourData.igReels && tourData.igReels.length > 0 && (
                            <section className="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden p-5">
                                <h3 className="text-xl font-black text-gray-900 mb-4 uppercase">Отзывы наших туристов</h3>
                                <div className="flex gap-3 overflow-x-auto no-scrollbar pb-2">
                                    {tourData.igReels.map((reel, idx) => (
                                        <a key={idx} href={reel.link} target="_blank" rel="noopener noreferrer"
                                           className="relative shrink-0 w-32 h-56 rounded-2xl overflow-hidden shadow-sm block">
                                            <img src={reel.thumbnail}
                                                 className="absolute inset-0 w-full h-full object-cover"
                                                 alt="Видео отзыв" />
                                            <div className="absolute inset-0 bg-black/20 flex items-center justify-center">
                                                <i data-lucide="play" className="w-10 h-10 text-white opacity-80"></i>
                                            </div>
                                        </a>
                                    ))}
                                </div>
                            </section>
                        )}

                        {tourData.termsNote && (
                            <section className="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden p-5">
                                <div className="flex items-start gap-3">
                                    <div className="w-10 h-10 bg-orange-50 rounded-xl flex items-center justify-center shrink-0">
                                        <i data-lucide="file-text" className="w-5 h-5 text-orange-500"></i>
                                    </div>
                                    <div>
                                        <h3 className="text-base font-black text-gray-900 uppercase mb-2">Изменения и отмена</h3>
                                        <p className="text-sm text-gray-700 leading-relaxed">{tourData.termsNote}</p>
                                    </div>
                                </div>
                            </section>
                        )}

                    </main>

                    {/* ОВЕРЛЕЙ ОТЗЫВОВ */}
                    {tourData.hotels && tourData.hotels.length > 0 && (
                        <ReviewOverlay
                            isOpen={isReviewsOpen}
                            onClose={() => setIsReviewsOpen(false)}
                            reviews={activeReviews}
                        />
                    )}

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
